<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小遊戲 - Lab 3</title>
    <link rel="stylesheet" href="game_style.css">
</head>
    <style>
        body {
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        .game-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1200px;
            width: 100%;
            overflow-y: auto; /* Allow scrolling only for the card container if needed */
            padding: 10px;
        }

        .game-card {
            flex: 1;
            min-width: 250px;
            max-width: 320px;
        }

        @media (max-width: 800px) {
            header h1 { font-size: 1.8rem; }
            header p { font-size: 0.9rem; }
            .game-container { gap: 10px; }
            .game-card { padding: 15px; }
            .icon-wrapper { font-size: 2.5rem; }
            .game-card h2 { font-size: 1.2rem; }
            .game-card p { font-size: 0.8rem; }
        }

        .back-home {
            margin-top: 30px;
            text-decoration: none;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="sparkles" id="sparkle-container"></div>

    <header>
        <h1>🎮 小遊戲</h1>
        <p>準備好要玩遊戲了嗎？挑選一個開始吧！ ✨</p>
    </header>

    <main class="game-container">
        <!-- Game 1: Tetris -->
        <div class="game-card game-1" onclick="location.href='tetris/index.html'">
            <div class="icon-wrapper">🧱</div>
            <h2>萌貓俄羅斯方塊</h2>
            <p>經典方塊遊戲！旋轉並堆疊方塊，整行消除來獲得高分吧！</p>
            <button class="play-btn">開始遊玩</button>
        </div>

        <!-- Game 2: Piano Tiles -->
        <div class="game-card game-2" onclick="location.href='piano/index.html'">
            <div class="icon-wrapper">🎹</div>
            <h2>夢幻鋼琴家</h2>
            <p>隨著音樂節奏，點擊落下的黑鍵！你能彈奏出多美妙的旋律呢？</p>
            <button class="play-btn">開始遊玩</button>
        </div>

        <!-- Game 3: Squid Game (Red Light, Green Light) -->
        <div class="game-card game-3" onclick="location.href='squid/index.html'">
            <div class="icon-wrapper">🏃</div>
            <h2>一二三木頭人</h2>
            <p>綠燈走、紅燈停！在時間內到達終點，千萬別被發現你在動喔！</p>
            <button class="play-btn">開始遊玩</button>
        </div>
    </main>

    <a href="../index.html" class="back-home">⬅ 返回主選單</a>

    <script>
        // 生成背景裝飾星星
        const sparkleContainer = document.getElementById('sparkle-container');
        const colors = ['#ff9fb2', '#a0e7e5', '#ffd166', '#ffffff'];
        
        for (let i = 0; i < 30; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            
            const size = Math.random() * 10 + 5;
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            const duration = Math.random() * 3 + 2;
            const delay = Math.random() * 5;
            
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${left}%`;
            sparkle.style.top = `${top}%`;
            sparkle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            sparkle.style.setProperty('--duration', `${duration}s`);
            sparkle.style.animationDelay = `${delay}s`;
            
            sparkleContainer.appendChild(sparkle);
        }

        function startGame(gameType) {
            console.log(`Starting game: ${gameType}`);
            // 這裡可以導向不同的遊戲頁面或是在當前頁面載入遊戲模組
            alert(`即將進入 ${gameType} 遊戲！遊戲內容開發中...`);
        }
    </script>
</body>
</html>
